apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: redis-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: redis
    rules:
    - alert: RedisMemoryHigh
      expr: redis_memory_used_bytes > 10485760  # 10MB 阈值
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Redis 内存使用率过高"
        description: "当前使用 {{ $value }} 字节，可能触发 OOM"

    - alert: RedisBlockedClients
      expr: redis_blocked_clients > 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Redis 存在阻塞客户端"
        description: "阻塞客户端数 {{ $value }}，可能有慢查询"
