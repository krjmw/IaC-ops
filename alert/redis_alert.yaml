apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: redis-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: redis
    rules:
    - alert: RedisMemoryHigh
      expr: (redis_memory_used_bytes / 10485760 )* 100  # 10MB 阈值
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Redis 内存使用率过高"
        description: "当前使用 {{ $value }} 字节，可能触发 OOM"

    - alert: Redisconnecter
      expr: redis_connected_clients > 50
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Redis 连接数高"
        description: "Redis 连接数 {{ $value }}，可能连接泄露"
