apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mongodb-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: mongodb
    rules:
    - alert: mongodbconnectedAlarm
      expr: mongodb_ss_connections{conn_type="current"} > 50
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "MongoDB 连接数高"
        description: "内存小，连接数不宜高"

    - alert: mongodbpagefaultsAlarm
      expr: rate(mongodb_ss_extra_info_page_faults[5m]) > 100
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "MongoDB 页错误率高"
        description: "内存不足，数据从磁盘读"


    - alert: mongodobejctsdocumentsAlarm
      expr: sum without(doc_op_type) (rate(mongodb_ss_metrics_queryExecutor_scannedObjects[5m])) / sum without(doc_op_type) (rate(mongodb_ss_metrics_document{doc_op_type="returned"}[5m]) + 1 ) > 10
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "MongoDB 扫描文档数 / 返回文档数"
        description: "索引效率低，扫描了大量文档才返回少量结果"
