apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: my-sock-shop-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: sock-shop
    rules:
    - alert: ServiceDown
      expr: sum by (service) ( (kube_pod_status_ready{condition="true"} == 1) * on(pod) group_left(service) kube_pod_labels ) < 1
      for: 1m
      annotations:
        summary: "服务 {{ $labels.service }} 没有就绪的 Pod"

    - alert: HighErrorRate
      expr: (sum by (service) (rate(request_duration_seconds_count{status_code=~"5.."}[5m])) / sum by (service) (rate(request_duration_seconds_count[5m]))) > 0.01
      for: 2m
      annotations:
        summary: "服务 {{ $labels.service }} 错误率 > 1%"

    - alert: HighLatency
      expr: histogram_quantile(0.99, sum by (le, service) (rate(request_duration_seconds_bucket[5m]))) > 0.5
      for: 5m
      annotations:
        summary: "服务 {{ $labels.service }} P99 延迟 > 500ms"

    - alert: FrequentRestarts
      expr: sum by (service) ( increase(kube_pod_container_status_restarts_total{namespace="sock-shop"}[10m]) * on(pod) group_left(service) kube_pod_labels ) > 2
      for: 2m
      annotations:
        summary: "服务 {{ $labels.service }} 10 分钟内重启超过 2 次"

    - alert: HighCPU
      expr: avg by (service) ( rate(container_cpu_usage_seconds_total{namespace="sock-shop"}[5m]) * on(pod) group_left(service) kube_pod_labels ) > 0.8
      for: 5m
      annotations:
        summary: "服务 {{ $labels.service }} CPU 使用率 > 80%"
