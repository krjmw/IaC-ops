prometheus:
  service:
    type: NodePort  
  prometheusSpec:
    retention: 2d
    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 1Gi
        cpu: 500m
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'dingtalk'
    receivers:
    - name: 'dingtalk'
      webhook_configs:
      - url: 'https://oapi.dingtalk.com/robot/send?access_token=6c68f322d0227254726a5229ec4975086a28087f8991ad39f9ddeb6944d9abf9&sign=SEC15cb5112a8a1b7fe84980e4c7296ae0ca9e9c6197fee4e139c0920615865c942'
        send_resolved: true
    - name: "null"
    templates:
    - '/etc/alertmanager/config/*.tmpl'
  service:
    type: NodePort
  resources:
    requests:
      memory: 128Mi
      cpu: 50m      
      
grafana:
  sidecar:
    datasources:
      enabled: false
  enabled: true
  adminPassword: "admin"
  service:
    type: NodePort
    nodePort: 30300
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-operated:9090
        access: proxy
        isDefault: true
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      sock-shop:
        gnetId: 11074
        revision: 1
        datasource: Prometheus
