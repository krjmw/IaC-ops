prometheus:
  service:
    type: NodePort  
  prometheusSpec:
    additionalScrapeConfigs: []
    retention: 2d
    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 1Gi
        cpu: 500m
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

defaultRules:
  create: false

alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m

  route:
    receiver: 'dingtalk'
    group_by: ['alertgroup', 'namespace']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
  
  routes:
  # Critical 快速通道
  - match:
      severity: critical
    group_wait: 10s
    continue: true
    
  # Warning 慢速通道
  - match:
      severity: warning
    group_wait: 1m

  # 抑制规则
inhibit_rules:
  # 1. Critical 抑制同 namespace 的 Warning（全局）
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['namespace']
    
  # 2. 单节点Node 宕机抑制同 node 的所有服务告警（跨 group）
  - source_match:
      alertgroup: node
      alertname: NodeStatus
      severity: critical
    target_match:
      alertgroup: app
    equal: ['namespace']
    
  # 3. 服务不可用抑制同 service 的高错误率（同 group 内精细化）
  - source_match:
      alertgroup: app
      alertname: ServiceDown
      severity: critical
    target_match:
      alertgroup: app
      alertname: HighErrorRate
    equal: ['namespace', 'service']
    
    receivers:
    - name: 'dingtalk'
      webhook_configs:
      - url: 'http://prometheus-webhook-dingtalk.monitoring:8060/dingtalk/webhook1/send'
        send_resolved: true
    - name: "null"
    templates:
    - '/etc/alertmanager/config/*.tmpl'
  service:
    type: NodePort
  resources:
    requests:
      memory: 128Mi
      cpu: 50m      
      
grafana:
  sidecar:
    datasources:
      enabled: false
  enabled: true
  adminPassword: "admin"
  service:
    type: NodePort
    nodePort: 30300
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-operated:9090
        access: proxy
        isDefault: true
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      sock-shop:
        gnetId: 11074
        revision: 1
        datasource: Prometheus

kube-state-metrics:
  metricLabelsAllowlist:
    - services=[*]
    - pods=[*]
    - namespaces=[*]
