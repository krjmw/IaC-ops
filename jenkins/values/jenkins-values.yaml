persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 8Gi
  hostPath: /data/jenkins

serviceType: NodePort
nodePort: 30080

controller:
  installPlugins:
    - kubernetes:4423.vb_59f230b_ce53
    - workflow-job:1571.vb_423c255d6d9
    - workflow-aggregator:608.v67378e9d3db_1
    - git:5.10.0
    - configuration-as-code:2053.vb_0da_47381a_25

  # 启用以下安全设置
  installLatestPlugins: false  # 避免自动升级依赖
  initializeOnce: true         # 首次部署后锁定插件版本
  overwritePlugins: false      # 防止意外覆盖现有插件
