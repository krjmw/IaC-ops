expose:
  type: nodePort
  tls:
    enabled: true                    # 改为 true
    certSource: "secret"             # 使用 secret 方式
    secret:
      secretName: "harbor-tls"       # secret 名称
      notarySecretName: "notary-tls"  # notary 的 secret（可选）
  nodePort:
    ports:
      https:                          # 新增 https 配置
        port: 443
        nodePort: 30443              # HTTPS 的 nodePort（可自定义）
      http:
        port: 80
        nodePort: 30002

externalURL: https://8.130.112.86:30443    # 改为 https，端口改为 30443

persistence:
  enabled: true
  storageClass: "local-path"
  persistentVolumeClaim:
    registry:
      size: 10Gi
    jobservice:
      size: 1Gi
    database:
      size: 5Gi
    redis:
      size: 1Gi

harborAdminPassword: "Harbor12345"

nginx:
  replicas: 1
portal:
  replicas: 1
core:
  replicas: 1
jobservice:
  replicas: 1
registry:
  replicas: 1
trivy:
  enabled: false
chartmuseum:
  enabled: false
